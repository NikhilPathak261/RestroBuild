services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-restrobuild}
      MYSQL_USER: ${MYSQL_USER:-restrobuild}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-restrobuild}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u${MYSQL_USER:-restrobuild} -p${MYSQL_PASSWORD:-restrobuild} --silent"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    environment:
      DB_URL: ${DB_URL:-jdbc:mysql://mysql:3306/restrobuild?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
      DB_USERNAME: ${DB_USERNAME:-restrobuild}
      DB_PASSWORD: ${DB_PASSWORD:-restrobuild}
      JWT_SECRET: ${JWT_SECRET:-change-this-development-secret-change-this-development-secret}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://localhost:3000}
      FRONTEND_BASE_URL: ${FRONTEND_BASE_URL:-http://localhost:5173}
      UPLOAD_MEDIA_DIR: ${UPLOAD_MEDIA_DIR:-uploads/media}
      JPA_DDL_AUTO: ${JPA_DDL_AUTO:-update}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-default}
      JAVA_OPTS: ${JAVA_OPTS:-}
      LOG_LEVEL_ROOT: ${LOG_LEVEL_ROOT:-INFO}
      LOG_LEVEL_APP: ${LOG_LEVEL_APP:-INFO}
      LOG_LEVEL_SECURITY: ${LOG_LEVEL_SECURITY:-WARN}
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    volumes:
      - backend_uploads:/app/uploads
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/health/ready || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8080/api}
        VITE_WS_BASE_URL: ${VITE_WS_BASE_URL:-ws://localhost:8080/ws}
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-5173}:80"

volumes:
  mysql_data:
  backend_uploads:
