spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/restrobuild_test}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=false

app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}
app.frontend.base-url=${FRONTEND_BASE_URL:http://localhost:5173}
app.upload.media-dir=${UPLOAD_MEDIA_DIR:target/test-uploads/media}
app.jwt.secret=${JWT_SECRET:change-this-development-secret-change-this-development-secret}
app.jwt.access-token-expiration-ms=${JWT_ACCESS_TOKEN_EXPIRATION_MS:900000}
app.jwt.refresh-token-expiration-ms=${JWT_REFRESH_TOKEN_EXPIRATION_MS:604800000}

springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false
